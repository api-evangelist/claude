specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Claude
providerId: claude
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - Generative AI
  - Large Language Models
  - Conversational AI
  - Natural Language Processing
description: >-
  Claude is offered through two pricing surfaces. Consumer / business plans (Free, Pro, Max, Team,
  Enterprise) are per-seat monthly subscriptions for the Claude apps. The Claude API is pay-as-you-go
  per-token usage across the model lineup (Opus 4.x, Sonnet 4.x, Haiku 4.5, plus deprecated 3.x
  models), with prompt-caching discounts (1.25x or 2x writes; 0.1x cache reads), a 50% Batch API
  discount, optional 6x Fast Mode (Opus 4.6 only), and a 1.1x US data-residency multiplier on
  Opus 4.6+ when inference_geo='us'. Web search adds $10 per 1,000 searches; code execution beyond
  the 1,550-hour monthly free tier is $0.05 per container-hour. Claude Managed Agents add session
  runtime at $0.08 per session-hour on top of token costs.
sources:
  - https://claude.com/pricing
  - https://platform.claude.com/docs/en/about-claude/pricing
  - https://platform.claude.com/docs/en/api/rate-limits
plans:
