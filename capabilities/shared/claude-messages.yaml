naftiko: "1.0.0-alpha1"

info:
  label: "Claude Messages API"
  description: "Anthropic Claude Messages API for creating messages, counting tokens, managing batches, and listing models."
  tags:
    - Anthropic
    - Claude
    - AI
    - Large Language Models
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      ANTHROPIC_API_KEY: ANTHROPIC_API_KEY

capability:
  consumes:
    - type: http
      namespace: claude-messages
      baseUri: https://api.anthropic.com/v1
      description: "Claude Messages API for AI-powered conversations and text generation."
      authentication:
        type: apikey
        key: x-api-key
        value: "{{ANTHROPIC_API_KEY}}"
        placement: header
      resources:
        - name: messages
          path: /messages
          description: "Message creation and token counting."
          operations:
            - name: create-message
              method: POST
              description: "Send a message to Claude and receive a response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  max_tokens: "{{tools.max_tokens}}"
                  messages: "{{tools.messages}}"
        - name: token-counting
          path: /messages/count_tokens
          description: "Token counting."
          operations:
            - name: count-message-tokens
              method: POST
              description: "Count tokens in a message."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  messages: "{{tools.messages}}"
        - name: message-batches
          path: /messages/batches
          description: "Message batch management."
          operations:
            - name: create-message-batch
              method: POST
              description: "Create a batch of message requests."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  requests: "{{tools.requests}}"
            - name: list-message-batches
              method: GET
              description: "List all message batches."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: message-batch-details
          path: /messages/batches/{message_batch_id}
          description: "Individual message batch management."
          operations:
            - name: retrieve-message-batch
              method: GET
              description: "Get message batch status."
              inputParameters:
                - name: message_batch_id
                  in: path
                  type: string
                  required: true
                  description: "Message batch ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-message-batch
              method: DELETE
              description: "Delete a message batch."
              inputParameters:
                - name: message_batch_id
                  in: path
                  type: string
                  required: true
                  description: "Message batch ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: message-batch-results
          path: /messages/batches/{message_batch_id}/results
          description: "Message batch results."
          operations:
            - name: retrieve-message-batch-results
              method: GET
              description: "Get message batch results."
              inputParameters:
                - name: message_batch_id
                  in: path
                  type: string
                  required: true
                  description: "Message batch ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: message-batch-cancel
          path: /messages/batches/{message_batch_id}/cancel
          description: "Cancel message batches."
          operations:
            - name: cancel-message-batch
              method: POST
              description: "Cancel a message batch."
              inputParameters:
                - name: message_batch_id
                  in: path
                  type: string
                  required: true
                  description: "Message batch ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: models
          path: /models
          description: "Model listing."
          operations:
            - name: list-models
              method: GET
              description: "List available Claude models."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: model-details
          path: /models/{model_id}
          description: "Model details."
          operations:
            - name: get-model
              method: GET
              description: "Get model metadata."
              inputParameters:
                - name: model_id
                  in: path
                  type: string
                  required: true
                  description: "Model ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
