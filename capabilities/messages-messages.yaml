naftiko: 1.0.0-alpha2
info:
  label: Claude Messages API — Messages
  description: 'Claude Messages API — Messages. 2 operations. Lead operation: Create a Message. Self-contained Naftiko capability
    covering one Claude business surface.'
  tags:
  - Claude
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLAUDE_API_KEY: CLAUDE_API_KEY
capability:
  consumes:
  - type: http
    namespace: messages-messages
    baseUri: https://api.anthropic.com/v1
    description: Claude Messages API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: messages
      path: /messages
      operations:
      - name: createmessage
        method: POST
        description: Create a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: messages-count_tokens
      path: /messages/count_tokens
      operations:
      - name: countmessagetokens
        method: POST
        description: Count Message Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.CLAUDE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: messages-messages-rest
    port: 8080
    description: REST adapter for Claude Messages API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/messages
      name: messages
      description: REST surface for messages.
      operations:
      - method: POST
        name: createmessage
        description: Create a Message
        call: messages-messages.createmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/messages/count-tokens
      name: messages-count-tokens
      description: REST surface for messages-count_tokens.
      operations:
      - method: POST
        name: countmessagetokens
        description: Count Message Tokens
        call: messages-messages.countmessagetokens
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: messages-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Claude Messages API — Messages. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-message
      description: Create a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: messages-messages.createmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: count-message-tokens
      description: Count Message Tokens
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: messages-messages.countmessagetokens
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
