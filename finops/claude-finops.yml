billingModel:
  pricingCategory: Pay-As-You-Go + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Claude
  ServiceCategory: AI Infrastructure
  ProviderName: Anthropic
  PublisherName: Anthropic, PBC
  InvoiceIssuerName: Anthropic, PBC
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: token
meters:
  - name: tokens_input
    description: Uncached input tokens billed at the model's base input rate (e.g. $5 / MTok for
      Opus 4.7, $3 / MTok for Sonnet 4.6, $1 / MTok for Haiku 4.5).
    unit: token
    aggregation: sum
    dimensions:
      - model
      - workspace
      - inference_geo
  - name: tokens_output
    description: Output tokens billed at the model's output rate (e.g. $25 / MTok for Opus 4.7,
      $15 / MTok for Sonnet 4.6, $5 / MTok for Haiku 4.5).
    unit: token
    aggregation: sum
    dimensions:
      - model
      - workspace
      - inference_geo
  - name: tokens_cache_write_5m
    description: 5-minute cache writes billed at 1.25x base input.
    unit: token
    aggregation: sum
    dimensions:
      - model
      - workspace
  - name: tokens_cache_write_1h
    description: 1-hour cache writes billed at 2x base input.
    unit: token
    aggregation: sum
    dimensions:
      - model
      - workspace
  - name: tokens_cache_read
    description: Cache read / hit tokens billed at 0.1x base input. On Claude 4.x models these do
      not count toward ITPM rate limits.
    unit: token
    aggregation: sum
    dimensions:
      - model
      - workspace
  - name: web_search_requests
    description: Server-tool web searches at $10 per 1,000.
    unit: search
    aggregation: sum
    dimensions:
      - workspace
  - name: code_execution_hours
    description: Code-execution container hours beyond the 1,550-hour monthly free tier, at $0.05 /
      hour per container.
    unit: container-hour
    aggregation: sum
    dimensions:
      - workspace
  - name: managed_agent_session_runtime
    description: Claude Managed Agents session runtime at $0.08 per session-hour, metered while the
      session is running (not idle).
    unit: session-hour
    aggregation: sum
    dimensions:
      - workspace
      - agent
  - name: consumer_seats
    description: Per-seat subscriptions for Pro, Max, Team, and Enterprise plans.
    unit: seat-month
    aggregation: max
    dimensions:
      - plan
      - region
principles:
  - name: Visibility
    description: Use the Claude Console Usage page (token / request / rate-limit charts), the Rate
      Limits API, and the anthropic-ratelimit-* response headers to track per-model consumption,
      cache-hit rate, and headroom in real time.
  - name: Allocation
    description: Allocate cost via Workspaces (separate API keys, spend ceilings, and rate caps per
      team / product) and the response usage object (input_tokens, cache_*_tokens, output_tokens,
      server_tool_use). Tag invoices to the consuming product / cost center.
  - name: Optimization
    description: Lean into prompt caching (cache reads at 10% of input price and excluded from ITPM
      on 4.x); use the Batch API (50% off) for non-interactive workloads; pick the right model
      (Haiku for routine, Sonnet for general, Opus for hardest reasoning); avoid Fast Mode (6x)
      unless latency-critical; avoid US-only inference_geo (1.1x) unless residency is required;
      monitor cache-hit rate on the Usage page.
  - name: Accountability
    description: Treat each Workspace as a budget owner with its own customer-set spend limit below
      the tier ceiling. Engineering owns model / cache choices; finance owns tier progression
      ($5 / $40 / $200 / $400 credit thresholds for Tier 1-4) and Monthly Invoicing transition.
