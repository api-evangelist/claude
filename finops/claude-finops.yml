description: >-
  FOCUS-aligned FinOps for Claude. Cost is split between per-seat consumer / business plans (Free,
  Pro, Max, Team, Enterprise) and pay-as-you-go API usage metered in input / output / cache tokens
  per model, plus server-tool charges (web search at $10 / 1k searches, code execution beyond the
  1,550-hour monthly free tier at $0.05 / container-hour, Managed Agents session runtime at $0.08 /
  session-hour). Spend is gated by usage tiers (Tier 1-4 ceilings of $100 / $500 / $1,000 / $200,000
  per month) until the organization moves to Monthly Invoicing. Effective unit cost is materially
  reduced by prompt caching (cache reads at 0.1x input price; cache reads excluded from ITPM rate
  limit on Claude 4.x) and by the Batch API (50% discount on input and output).
