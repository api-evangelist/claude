policies:
  - name: Token-bucket replenishment
    description: Capacity is continuously replenished up to the maximum, not reset on fixed
      intervals. Short bursts above steady-state can still trigger 429 errors.
  - name: Cache-aware ITPM
    description: For Claude 4.x models, cache_read_input_tokens do NOT count toward ITPM. Only
      uncached input_tokens plus cache_creation_input_tokens are charged against the per-minute
      input limit, making prompt caching an effective lever to increase effective throughput.
  - name: Backoff Strategy
    description: On 429, honor the retry-after header before retrying. Use exponential backoff with
      jitter for sustained pressure.
  - name: Per-model independence
    description: Limits are applied separately per model class, so concurrent traffic across Opus,
      Sonnet, and Haiku draws from independent buckets.
  - name: Acceleration limits
    description: Sharp usage spikes can trigger acceleration-limit 429s independent of the published
      tier limit. Ramp traffic gradually and maintain consistent patterns.
  - name: Workspace sub-limits
    description: Each workspace can have its own RPM / ITPM / OTPM caps below the org limit;
      organization-wide caps always apply.
  - name: Tier increases
    description: Auto-advance on credit purchases up to Tier 4. Beyond Tier 4 (or for higher RPM /
      ITPM / OTPM), contact sales via the Limits page in the Claude Console.
  - name: Programmatic limits
    description: Use the Rate Limits API to read configured organization and workspace limits in
      code; monitor live consumption via the anthropic-ratelimit-* response headers.
